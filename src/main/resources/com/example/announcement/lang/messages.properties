cmd.help.header=<gradient:#FFD700:#FFA500>========== ChatAnnouncement ==========</gradient>
cmd.help.send=<yellow>/announcement send <player|all> <message></yellow> <gray>- Send an announcement to a player or everyone</gray>
cmd.help.broadcast=<yellow>/announcement broadcast <message></yellow> <gray>- Broadcast an announcement</gray>
cmd.help.template=<yellow>/announcement template <name> <player|all></yellow> <gray>- Send an announcement using a template</gray>
cmd.help.reload=<yellow>/announcement reload</yellow> <gray>- Reload configuration</gray>
cmd.help.help=<yellow>/announcement help</yellow> <gray>- Show this help</gray>
cmd.help.footer=<gradient:#FFD700:#FFA500>===================================</gradient>
cmd.unknown=<red>Unknown subcommand! Use <yellow>/announcement help</yellow> for help</red>
cmd.no-permission=<red>You do not have permission to run this command!</red>
cmd.usage.send=<red>Usage: <yellow>/announcement send <player|all> <message></yellow></red>
cmd.usage.broadcast=<red>Usage: <yellow>/announcement broadcast <message></yellow></red>
cmd.usage.template=<red>Usage: <yellow>/announcement template <name> <player|all></yellow></red>
cmd.player-not-found=<red>Player <yellow>%s</yellow> is not online!</red>
cmd.send.single.ok=<green>Announcement sent to <yellow>%s</yellow>!</green>
cmd.send.all.ok=<green>Announcement sent to all online players!</green>
cmd.broadcast.ok=<green>Announcement broadcast!</green>
cmd.template.not-found=<red>Template <yellow>%s</yellow> does not exist!</red>
cmd.template.single.ok=<green>Template <yellow>%s</yellow> sent to <yellow>%s</yellow>!</green>
cmd.template.all.ok=<green>Template <yellow>%s</yellow> sent to all online players!</green>
cmd.reload.ok=<green>Configuration reloaded!</green>
parse.error=<red>Failed to parse the message, please check MiniMessage syntax.</red>
